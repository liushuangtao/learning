<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仲裁员资源库 — 法务管理系统</title>
<style>
/* ═══════════════════════════════════════════════════════
   数科通用UI展示标准 V1.1  ×  UI/UX Pro Max  ×  hue
   三层融合架构示例
   ═══════════════════════════════════════════════════════ */

/* === [数科标准] CSS 变量 — 精确 Token === */
:root {
  /* 品牌色 */
  --brand-color: #0044A0;
  --brand-hover: #2076EA;
  --brand-click: #003C8D;
  --brand-forbidden: #C3DBFD;
  --brand-label-bg: #E7EEF6;
  /* 华润琥珀黄 */
  --yellow-color: #F9B334;
  --yellow-hover: #FFB25A;
  --yellow-click: #D37913;
  --yellow-forbidden: #FFCA8E;
  --yellow-label-bg: #FEF0E1;
  /* 背景 */
  --bg-page: #F2F5F9;
  --bg-container: #F2F3F7;
  --bg-secondary: #F3F8FF;
  --bg-disabled: #F5F5F5;
  --bg-white: #FFFFFF;
  /* 线条 */
  --line-stroke: #E6E7EA;
  --line-input-border: #E6E7EA;
  --line-select-border: #C3C6CD;
  --line-btn-border: #AFB0B3;
  --line-btn-border-deep: #898B8F;
  /* 文字 */
  --text-primary: #1A1B1E;
  --text-main: #4D4E55;
  --text-secondary: #676768;
  --text-sub: #898B8F;
  --text-placeholder: #C1C4C8;
  --text-disabled: #D9DADB;
  --text-anti: #FFFFFF;
  --text-link: #0044A0;
  --icon-secondary: #9AA3B0;
  /* 功能色 */
  --error-color: #F84224;
  --error-hover: #FF6247;
  --error-click: #E63013;
  --error-forbidden: #FFBDB2;
  --error-label-bg: #FFE7E7;
  --warning-color: #FF822E;
  --warning-hover: #FF9C5A;
  --warning-click: #E67022;
  --warning-forbidden: #FFCBA8;
  --warning-label-bg: #FFF2EA;
  --success-color: #00AA6E;
  --success-hover: #1BDC98;
  --success-click: #027A50;
  --success-forbidden: #A4EED4;
  --success-label-bg: #E5F6F0;
  /* [Pro Max] z-index 分层体系 */
  --z-base: 0;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 500;
  --z-modal: 1000;
  --z-toast: 2000;
  /* [Pro Max] 阴影 — 4 级体系 */
  --shadow-1: 0 2px 5px rgba(0,0,0,0.10);
  --shadow-2: 0 4px 10px rgba(0,0,0,0.10);
  --shadow-3: 0 8px 20px rgba(0,0,0,0.10);
  --shadow-4: 0 12px 30px rgba(0,0,0,0.12);
  /* 圆角 */
  --radius-sm: 3px;
  --radius-base: 4px;
  --radius-lg: 8px;
  /* [Pro Max] 动效 Token */
  --ease-smooth: cubic-bezier(.38,0,.24,1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;
}

/* [Pro Max] 预设 reduced-motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", "Hiragino Sans GB", Arial, sans-serif;
  font-size: 14px;
  line-height: 22px;
  color: var(--text-main);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══════════════════════════════════════════════════════
   [数科标准] 帧布局 — Header + Sidebar + Main Content
   ═══════════════════════════════════════════════════════ */
.layout { display: flex; min-height: 100vh; }

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: var(--z-sticky);
  height: 60px; background: var(--bg-white);
  border-bottom: 1px solid var(--line-stroke);
  display: flex; align-items: center;
  padding: 0 24px;
  box-shadow: var(--shadow-1);
}
.header-logo {
  display: flex; align-items: center; gap: 12px;
  width: 220px; flex-shrink: 0;
}
.header-logo .logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--brand-color) 40%, var(--yellow-color));
  border-radius: var(--radius-base);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-anti); font-weight: 700; font-size: 16px;
}
.header-logo .logo-text {
  font-size: 16px; font-weight: 600; color: var(--text-primary);
  white-space: nowrap;
}
.header-nav {
  flex: 1; display: flex; align-items: center; gap: 24px;
  padding-left: 40px;
}
.header-nav a {
  color: var(--text-secondary); text-decoration: none;
  font-size: 14px; transition: color var(--duration-fast) var(--ease-smooth);
  height: 60px; display: flex; align-items: center;
  border-bottom: 2px solid transparent;
}
.header-nav a:hover { color: var(--brand-hover); }
.header-nav a.active {
  color: var(--brand-color); font-weight: 500;
  border-bottom-color: var(--brand-color);
}
.header-right {
  display: flex; align-items: center; gap: 16px;
  margin-left: auto;
}
.header-right .user-info {
  display: flex; align-items: center; gap: 8px;
  color: var(--text-main); cursor: pointer;
}
.header-right .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--brand-color);
  color: var(--text-anti); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}

/* Sidebar */
.sidebar {
  position: fixed; top: 60px; left: 0; bottom: 0;
  width: 220px; background: var(--brand-color);
  padding-top: 16px; overflow-y: auto;
  z-index: var(--z-sticky);
}
.sidebar .nav-section {
  padding: 0 16px; margin-bottom: 8px;
}
.sidebar .nav-section .section-title {
  font-size: 12px; color: rgba(255,255,255,0.5);
  padding: 8px 12px; letter-spacing: 1px;
}
.sidebar .nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; margin: 2px 8px;
  color: rgba(255,255,255,0.75); text-decoration: none;
  font-size: 14px; border-radius: var(--radius-base);
  transition: all var(--duration-fast) var(--ease-smooth);
  cursor: pointer;
}
.sidebar .nav-item:hover {
  background: rgba(255,255,255,0.1);
  color: var(--text-anti);
}
.sidebar .nav-item.active {
  background: rgba(255,255,255,0.15);
  color: var(--text-anti); font-weight: 500;
}
.sidebar .nav-item .nav-icon {
  width: 18px; height: 18px; flex-shrink: 0;
  opacity: 0.7;
}

/* Main Content */
.main {
  margin-left: 220px; margin-top: 60px;
  flex: 1; padding: 0;
  min-height: calc(100vh - 60px);
}
.page-content {
  max-width: 1440px; margin: 0 auto;
  padding: 24px;
}

/* ═══════════════════════════════════════════════════════
   [数科标准 + Pro Max] 面包屑
   ═══════════════════════════════════════════════════════ */
.breadcrumb {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-sub);
  margin-bottom: 16px;
}
.breadcrumb a {
  color: var(--text-link); text-decoration: none;
  transition: color var(--duration-fast) var(--ease-smooth);
}
.breadcrumb a:hover { color: var(--brand-hover); text-decoration: underline; }
.breadcrumb .sep { color: var(--line-btn-border); }

/* ═══════════════════════════════════════════════════════
   [数科标准] 页面标题
   ═══════════════════════════════════════════════════════ */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.page-header h1 {
  font-size: 20px; font-weight: 600; color: var(--text-primary);
  line-height: 28px;
}
.page-header .header-actions {
  display: flex; align-items: center; gap: 12px;
}

/* ═══════════════════════════════════════════════════════
   [数科标准] 按钮系统
   [Pro Max] 触点 ≥44px / hover 过渡 200ms
   ═══════════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 32px; padding: 0 20px;
  border: 1px solid var(--line-btn-border);
  border-radius: var(--radius-base);
  font-size: 14px; font-family: inherit;
  cursor: pointer; white-space: nowrap;
  background: var(--bg-white); color: var(--text-main);
  transition: all var(--duration-fast) var(--ease-smooth);
  outline: none; user-select: none;
  /* [Pro Max] 确保触达目标 ≥44px（通过 padding 扩展） */
  min-height: 32px;
}
/* [Pro Max] 焦点环 */
.btn:focus-visible {
  outline: 2px solid var(--brand-color);
  outline-offset: 2px;
}
.btn:hover { border-color: var(--brand-hover); color: var(--brand-hover); }
.btn:active { border-color: var(--brand-click); color: var(--brand-click); }
.btn:disabled {
  opacity: 0.45; cursor: not-allowed;
  border-color: var(--line-stroke); color: var(--text-disabled);
}

.btn-primary {
  background: var(--brand-color); border-color: var(--brand-color);
  color: var(--text-anti);
}
.btn-primary:hover { background: var(--brand-hover); border-color: var(--brand-hover); color: var(--text-anti); }
.btn-primary:active { background: var(--brand-click); border-color: var(--brand-click); color: var(--text-anti); }
.btn-primary:disabled { background: var(--brand-forbidden); border-color: var(--brand-forbidden); color: var(--text-anti); opacity: 1; }

.btn-success {
  background: var(--success-color); border-color: var(--success-color);
  color: var(--text-anti);
}
.btn-success:hover { background: var(--success-hover); border-color: var(--success-hover); color: var(--text-anti); }

.btn-danger {
  background: transparent; border-color: var(--error-color);
  color: var(--error-color);
}
.btn-danger:hover { background: var(--error-color); border-color: var(--error-color); color: var(--text-anti); }
.btn-danger:active { background: var(--error-click); border-color: var(--error-click); }

.btn-yellow {
  background: var(--yellow-color); border-color: var(--yellow-color);
  color: var(--text-primary);
}
.btn-yellow:hover { background: var(--yellow-hover); border-color: var(--yellow-hover); }

.btn-text {
  background: transparent; border: none;
  color: var(--text-link); padding: 0 8px;
}
.btn-text:hover { color: var(--brand-hover); background: transparent; }

.btn-sm { height: 28px; padding: 0 12px; font-size: 12px; }
.btn-lg { height: 40px; padding: 0 28px; font-size: 16px; }

.btn-icon {
  width: 32px; height: 32px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--line-btn-border);
  border-radius: var(--radius-base);
  background: var(--bg-white); cursor: pointer; color: var(--icon-secondary);
  transition: all var(--duration-fast) var(--ease-smooth);
}
.btn-icon:hover { border-color: var(--brand-hover); color: var(--brand-hover); }

/* ═══════════════════════════════════════════════════════
   [数科标准] 搜索面板
   ═══════════════════════════════════════════════════════ */
.search-panel {
  background: var(--bg-white); border-radius: var(--radius-lg);
  padding: 20px 24px 16px;
  box-shadow: var(--shadow-1);
  margin-bottom: 16px;
}
.search-row {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 16px 0;
}
.search-row .field {
  display: flex; align-items: center; gap: 8px;
  width: 33.33%; /* 3 列 */
  padding-right: 16px;
}
.search-row .field label {
  width: 80px; text-align: right; flex-shrink: 0;
  color: var(--text-main); font-size: 14px;
  white-space: nowrap;
}
.search-row .field input,
.search-row .field select {
  flex: 1; height: 32px; padding: 0 12px;
  border: 1px solid var(--line-input-border);
  border-radius: var(--radius-base);
  font-size: 14px; font-family: inherit;
  color: var(--text-main); background: var(--bg-white);
  transition: border-color var(--duration-fast) var(--ease-smooth);
  outline: none; min-width: 0;
}
.search-row .field input:focus,
.search-row .field select:focus {
  border-color: var(--brand-color);
  box-shadow: 0 0 0 2px rgba(0,68,160,0.12);
}
.search-row .field input::placeholder { color: var(--text-placeholder); }

.search-advanced {
  margin-top: 16px; padding-top: 16px;
  border-top: 1px dashed var(--line-stroke);
  display: none;
}
.search-advanced.show { display: block; }

.search-divider {
  margin: 16px 0 0;
  border: none; border-top: 1px solid var(--line-stroke);
}
.search-actions {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-top: 16px;
}
.search-actions .advanced-toggle {
  color: var(--text-link); cursor: pointer; font-size: 13px;
  text-decoration: none; margin-right: auto;
  transition: color var(--duration-fast) var(--ease-smooth);
}
.search-actions .advanced-toggle:hover { color: var(--brand-hover); }

/* ═══════════════════════════════════════════════════════
   [数科标准] 工具栏
   ═══════════════════════════════════════════════════════ */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
}
.toolbar .toolbar-left { display: flex; align-items: center; gap: 10px; }
.toolbar .toolbar-right { display: flex; align-items: center; gap: 8px; }
.toolbar .toolbar-divider {
  width: 1px; height: 20px; background: var(--line-stroke);
  margin: 0 4px;
}

/* ═══════════════════════════════════════════════════════
   [数科标准] 表格
   ═══════════════════════════════════════════════════════ */
.table-wrapper {
  background: var(--bg-white); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-1); overflow: hidden;
}
table {
  width: 100%; border-collapse: collapse;
  font-size: 14px;
}
thead th {
  background: var(--bg-container); /* ⚠️ #F2F3F7, 不是 #FAFAFA */
  color: var(--text-primary); font-weight: 500;
  height: 48px; padding: 0 16px;
  text-align: left; border-bottom: 1px solid var(--line-stroke);
  white-space: nowrap; position: relative;
}
thead th .sort-icon {
  display: inline-block; margin-left: 4px;
  color: var(--line-btn-border); cursor: pointer;
  font-size: 10px; vertical-align: middle;
}
thead th.sort-active .sort-icon { color: var(--brand-color); }

tbody td {
  height: 48px; padding: 0 16px;
  border-bottom: 1px solid var(--line-stroke);
  color: var(--text-main); vertical-align: middle;
}
tbody tr:nth-child(even) { background: #FAFBFC; }
tbody tr:hover { background: #F5F7FA; }
tbody tr:last-child td { border-bottom: none; }

/* 复选框 */
.table-checkbox {
  width: 16px; height: 16px;
  accent-color: var(--brand-color); cursor: pointer;
}

/* ═══════════════════════════════════════════════════════
   [数科标准] 状态标签
   ═══════════════════════════════════════════════════════ */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: var(--radius-sm);
  font-size: 12px; line-height: 20px;
  border: 1px solid transparent; white-space: nowrap;
}
.tag-success { background: var(--success-label-bg); color: var(--success-color); border-color: var(--success-forbidden); }
.tag-warning { background: var(--warning-label-bg); color: var(--warning-color); border-color: var(--warning-forbidden); }
.tag-info    { background: var(--brand-label-bg); color: var(--brand-color); border-color: var(--brand-forbidden); }
.tag-default { background: var(--bg-disabled); color: var(--text-sub); border-color: var(--line-stroke); }
.tag-danger  { background: var(--error-label-bg); color: var(--error-color); border-color: var(--error-forbidden); }
.tag-yellow  { background: var(--yellow-label-bg); color: var(--yellow-click); border-color: var(--yellow-forbidden); }

/* 表格内的标签 */
td .tag { margin: 0; }

/* ═══════════════════════════════════════════════════════
   [数科标准] 操作列
   ═══════════════════════════════════════════════════════ */
.action-links {
  display: flex; align-items: center; gap: 0;
  white-space: nowrap;
}
.action-links a {
  color: var(--text-link); font-size: 13px; text-decoration: none;
  padding: 4px 8px; transition: color var(--duration-fast) var(--ease-smooth);
  cursor: pointer;
  /* [Pro Max] min touch target for links */
  min-height: 28px; display: inline-flex; align-items: center;
}
.action-links a:hover { color: var(--brand-hover); text-decoration: underline; }
.action-links a.danger { color: var(--error-color); }
.action-links a.danger:hover { color: var(--error-hover); }
.action-links .sep { color: var(--line-stroke); font-size: 12px; margin: 0 0; }
.action-links .more-dropdown {
  position: relative; display: inline-block;
}
.action-links .more-dropdown .more-trigger {
  color: var(--text-link); cursor: pointer; padding: 4px 8px;
  font-size: 13px;
}
.action-links .more-dropdown .more-menu {
  display: none; position: absolute; top: 100%; right: 0;
  background: var(--bg-white); border-radius: var(--radius-base);
  box-shadow: var(--shadow-3); z-index: var(--z-dropdown);
  min-width: 120px; padding: 4px 0;
  border: 1px solid var(--line-stroke);
}
.action-links .more-dropdown:hover .more-menu { display: block; }
.action-links .more-dropdown .more-menu a {
  display: block; padding: 8px 16px; color: var(--text-main);
  text-decoration: none; font-size: 13px;
}
.action-links .more-dropdown .more-menu a:hover { background: var(--bg-container); }

/* ═══════════════════════════════════════════════════════
   [数科标准] 分页
   ═══════════════════════════════════════════════════════ */
.pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-top: 1px solid var(--line-stroke);
}
.pagination .total { font-size: 13px; color: var(--text-secondary); }
.pagination .pager { display: flex; align-items: center; gap: 4px; }
.pagination .page-btn {
  width: 32px; height: 32px; display: flex;
  align-items: center; justify-content: center;
  border: 1px solid var(--line-stroke);
  border-radius: var(--radius-base);
  background: var(--bg-white); color: var(--text-main);
  font-size: 13px; cursor: pointer;
  transition: all var(--duration-fast) var(--ease-smooth);
}
.pagination .page-btn:hover { border-color: var(--brand-color); color: var(--brand-color); }
.pagination .page-btn.active {
  background: var(--brand-color); border-color: var(--brand-color);
  color: var(--text-anti);
}
.pagination .page-btn:disabled {
  opacity: 0.4; cursor: not-allowed; border-color: var(--line-stroke); color: var(--text-disabled);
}
.pagination .page-ellipsis {
  width: 32px; text-align: center; color: var(--text-sub);
}
.pagination .page-size {
  font-size: 13px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 6px;
}
.pagination .page-size select {
  height: 28px; padding: 0 8px;
  border: 1px solid var(--line-input-border); border-radius: var(--radius-base);
  font-size: 13px; font-family: inherit; color: var(--text-main);
  outline: none;
}

/* ═══════════════════════════════════════════════════════
   [数科标准 + Pro Max] 弹窗
   [hue] 入场动画
   ═══════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: var(--z-modal);
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg-white); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-4);
  min-width: 520px; max-width: 90vw;
  max-height: 85vh; display: flex; flex-direction: column;
  /* [Pro Max] 入场动效 */
  animation: modalIn var(--duration-normal) var(--ease-smooth);
}
/* [hue] 弹窗入场动画 — 两层（fade + slideUp） */
@keyframes modalIn {
  from { opacity: 0; transform: translateY(-20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 0;
}
.modal-header h3 {
  font-size: 18px; font-weight: 500; color: var(--text-primary);
  line-height: 26px;
}
.modal-header .close-btn {
  width: 32px; height: 32px; display: flex;
  align-items: center; justify-content: center;
  border: none; background: transparent; cursor: pointer;
  font-size: 20px; color: var(--text-sub); border-radius: var(--radius-base);
  transition: all var(--duration-fast) var(--ease-smooth);
}
.modal-header .close-btn:hover {
  background: var(--bg-container); color: var(--text-primary);
}
.modal-body {
  padding: 20px 24px; overflow-y: auto; flex: 1;
}
.modal-footer {
  display: flex; align-items: center; justify-content: flex-end; gap: 12px;
  padding: 16px 24px; border-top: 1px solid var(--line-stroke);
}

/* ═══════════════════════════════════════════════════════
   [数科标准] 表单（弹窗内）
   ═══════════════════════════════════════════════════════ */
.form-block-title {
  font-size: 16px; font-weight: 500; color: var(--text-primary);
  line-height: 24px;
  padding-left: 12px;
  border-left: 3px solid var(--brand-color);
  margin-bottom: 16px;
}
.form-item {
  display: flex; align-items: flex-start; gap: 12px;
  margin-bottom: 16px;
}
.form-item > label {
  width: 100px; text-align: right; flex-shrink: 0;
  color: var(--text-main); font-size: 14px;
  line-height: 32px;
}
.form-item > label .required {
  color: var(--error-color); /* ⚠️ #F84224, 不是 #d9001b */
  margin-right: 3px;
}
.form-item .form-control {
  flex: 1; max-width: 400px;
}
.form-item input, .form-item select, .form-item textarea {
  width: 100%; height: 32px; padding: 0 12px;
  border: 1px solid var(--line-input-border);
  border-radius: var(--radius-base);
  font-size: 14px; font-family: inherit;
  color: var(--text-main); background: var(--bg-white);
  transition: border-color var(--duration-fast) var(--ease-smooth);
  outline: none;
}
.form-item input:focus, .form-item select:focus, .form-item textarea:focus {
  border-color: var(--brand-color);
  box-shadow: 0 0 0 2px rgba(0,68,160,0.12);
}
.form-item textarea { height: auto; padding: 8px 12px; resize: vertical; min-height: 72px; }
.form-item .help-text {
  font-size: 12px; color: var(--text-secondary); margin-top: 4px;
}
.form-item .error-text {
  font-size: 12px; color: var(--error-color); margin-top: 4px;
  display: none;
}
.form-item.has-error input { border-color: var(--error-color); }
.form-item.has-error .error-text { display: block; }

/* ═══════════════════════════════════════════════════════
   [Pro Max] Toast 通知
   ═══════════════════════════════════════════════════════ */
.toast-container {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  z-index: var(--z-toast);
  display: none; flex-direction: column; gap: 8px;
}
.toast-container.show { display: flex; }
.toast {
  padding: 10px 24px; border-radius: var(--radius-base);
  background: var(--text-primary); color: var(--text-anti);
  font-size: 14px; box-shadow: var(--shadow-3);
  animation: toastIn var(--duration-fast) var(--ease-smooth);
}
.toast.success { background: var(--success-color); }
.toast.error { background: var(--error-color); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════════════
   [Pro Max + hue] 空状态
   ═══════════════════════════════════════════════════════ */
.empty-state {
  text-align: center; padding: 64px 24px;
  color: var(--text-sub);
}
.empty-state .empty-icon {
  width: 80px; height: 80px; margin: 0 auto 16px;
  background: var(--bg-container); border-radius: 50%;

  { name: '刘伟强', gender: '男', org: '广州仲裁委员会', field: '房地产', region: '广东省', status: '禁用', date: '2023-09-18' },

  { name: '吴玉琴', gender: '女', org: '上海国际经济贸易仲裁委员会', field: '知识产权', region: '浙江省', status: '启用', date: '2023-12-12' },
  { name: '郑鸿飞', gender: '男', org: '中国国际经济贸易仲裁委员会', field: '国际贸易', region: '上海市', status: '启用', date: '2024-03-28' },
  { name: '林秀芝', gender: '女', org: '北京仲裁委员会', field: '公司并购', region: '江苏省', status: '启用', date: '2024-04-15' },
  { name: '黄志华', gender: '男', org: '广州仲裁委员会', field: '房地产', region: '广东省', status: '禁用', date: '2024-01-22' },
  { name: '杨晓峰', gender: '男', org: '中国国际经济贸易仲裁委员会', field: '建设工程', region: '四川省', status: '待审核', date: '2024-06-10' },
  { name: '马晓燕', gender: '女', org: '深圳国际仲裁院', field: '金融证券', region: '上海市', status: '启用', date: '2023-10-08' },
];

let currentPage = 1;
let pageSize = 10;
let deleteTarget = null;

function getStatusTag(status) {
  const map = {
    '启用': 'success',
    '禁用': 'default',
    '待审核': 'info'
  };
  const cls = map[status] || 'default';
  return `<span class="tag tag-${cls}">${status}</span>`;
}

function renderTable() {
  const start = (currentPage - 1) * pageSize;
  const end = Math.min(start + pageSize, mockData.length);
  const pageData = mockData.slice(start, end);
  const tbody = document.getElementById('tableBody');
  const totalSpan = document.getElementById('totalCount');
  const emptyState = document.getElementById('emptyState');

  totalSpan.textContent = mockData.length;

  if (pageData.length === 0) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  tbody.innerHTML = pageData.map((item, i) => {
    const actions = [
      { label: '编辑', cls: '' },
      { label: '详情', cls: '' },
      { label: '删除', cls: 'danger', action: `deleteItem(${start + i})` },
    ];

    let actionHtml = '';
    if (actions.length <= 4) {
      actionHtml = actions.map((a, idx) => {
        const sep = idx > 0 ? '<span class="sep">|</span>' : '';
        if (a.action) {
          return `${sep}<a class="${a.cls}" href="javascript:void(0)" onclick="${a.action}">${a.label}</a>`;
        }
        return `${sep}<a class="${a.cls}" href="javascript:void(0)">${a.label}</a>`;
      }).join('');
    }

    return `<tr>
      <td><input type="checkbox" class="table-checkbox" aria-label="选择 ${item.name}"></td>
      <td><strong style="color:var(--text-primary);font-weight:500;">${item.name}</strong></td>
      <td>${item.gender}</td>
      <td>${item.org}</td>
      <td><span class="tag tag-info">${item.field}</span></td>
      <td>${item.region}</td>
      <td>${getStatusTag(item.status)}</td>
      <td style="color:var(--text-secondary);font-size:13px;">${item.date}</td>
      <td><div class="action-links">${actionHtml}</div></td>
    </tr>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(mockData.length / pageSize);
  const pageNumbers = document.getElementById('pageNumbers');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');

  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;

  let pages = [];
  const range = 2;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - range && i <= currentPage + range)) {
      pages.push(i);
    } else if (pages[pages.length - 1] !== '...') {
      pages.push('...');
    }
  }

  pageNumbers.innerHTML = pages.map(p => {
    if (p === '...') return '<span class="page-ellipsis">…</span>';
    return `<button class="page-btn${p === currentPage ? ' active' : ''}" onclick="goPage(${p})">${p}</button>`;
  }).join('');
}

function goPage(p) {
  const totalPages = Math.ceil(mockData.length / pageSize);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
}

function changePageSize(size) {
  pageSize = parseInt(size);
  currentPage = 1;
  renderTable();
}

// === [hue 反模式] 删除 — 必须有 Popconfirm ===
function deleteItem(index) {
  deleteTarget = index;
  const btn = event.target;
  const rect = btn.getBoundingClientRect();
  const pop = document.getElementById('deleteConfirm');
  pop.style.top = (rect.top - 60) + 'px';
  pop.style.left = (rect.left - 80) + 'px';
  pop.classList.add('show');
}

function hideDeleteConfirm() {
  document.getElementById('deleteConfirm').classList.remove('show');
  deleteTarget = null;
}

function confirmDelete() {
  if (deleteTarget !== null) {
    mockData.splice(deleteTarget, 1);
    if (currentPage > Math.ceil(mockData.length / pageSize)) {
      currentPage = Math.max(1, Math.ceil(mockData.length / pageSize));
    }
    renderTable();
    showToast('删除成功', 'success');
  }
  hideDeleteConfirm();
}

// === 批量删除 ===
function confirmBatchDelete() {
  const checked = document.querySelectorAll('#tableBody .table-checkbox:checked');
  if (checked.length === 0) {
    showToast('请先选择要删除的记录', 'warning');
    return;
  }
  if (confirm('确定删除选中的 ' + checked.length + ' 条记录吗？')) {
    showToast('批量删除成功', 'success');
  }
}

// === 全选 ===
function toggleAll(el) {
  document.querySelectorAll('#tableBody .table-checkbox').forEach(cb => cb.checked = el.checked);
}

// === [数科标准] 高级搜索折叠 ===
function toggleAdvanced() {
  const panel = document.getElementById('advancedSearch');
  const icon = document.getElementById('advIcon');
  const text = document.getElementById('advText');
  const isOpen = panel.classList.toggle('show');
  icon.textContent = isOpen ? '▲' : '▼';
  text.textContent = isOpen ? '收起搜索' : '高级搜索';
}

// === 弹窗 ===
function openModal(id) {
  document.getElementById(id).classList.add('show');
  document.body.style.overflow = 'hidden';
  // [Pro Max] 焦点管理
  setTimeout(() => {
    const firstInput = document.querySelector('#' + id + ' input, #' + id + ' select');
    if (firstInput) firstInput.focus();
  }, 100);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  document.body.style.overflow = '';
}

// 点击遮罩关闭弹窗
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('show');
      document.body.style.overflow = '';
    }
  });
});

// [Pro Max] Esc 键关闭弹窗
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.show').forEach(m => {
      m.classList.remove('show');
      document.body.style.overflow = '';
    });
  }
});

// === [Pro Max] Toast ===
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type ? ' ' + type : '');
  toast.textContent = msg;
  container.classList.add('show');
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 300ms';
    setTimeout(() => {
      toast.remove();
      if (container.children.length === 0) container.classList.remove('show');
    }, 300);
  }, 3000);
}

// === 重置 ===
function resetSearch() {
  document.querySelectorAll('.search-panel input, .search-panel select').forEach(el => el.value = '');
  currentPage = 1;
  renderTable();
  showToast('搜索条件已重置', 'success');
}

// === 初始化 ===
renderTable();
</script>
